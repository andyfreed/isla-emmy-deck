name: build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  GODOT_VERSION: "4.7-stable"
  TEMPLATES_DIR: "4.7.stable"

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Godot + export templates
        run: |
          set -e
          base="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}"
          wget -q "${base}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          wget -q "${base}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          mv "Godot_v${GODOT_VERSION}_linux.x86_64" godot
          chmod +x godot
          mkdir -p "$HOME/.local/share/godot/export_templates/${TEMPLATES_DIR}"
          unzip -q "Godot_v${GODOT_VERSION}_export_templates.tpz"
          mv templates/* "$HOME/.local/share/godot/export_templates/${TEMPLATES_DIR}/"

      - name: Import resources
        run: ./godot --headless --path . --import || true

      - name: Export Linux build
        run: |
          mkdir -p build
          ./godot --headless --path . --export-release "Linux" build/isla-emmy.x86_64
          chmod +x build/isla-emmy.x86_64
          ls -la build

      - name: Install rcodesign (macOS signing from Linux)
        run: |
          set -e
          V="0.29.0"
          wget -q "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F${V}/apple-codesign-${V}-x86_64-unknown-linux-musl.tar.gz"
          tar xzf "apple-codesign-${V}-x86_64-unknown-linux-musl.tar.gz"
          sudo mv "apple-codesign-${V}-x86_64-unknown-linux-musl/rcodesign" /usr/local/bin/rcodesign
          rcodesign --version
          # tell the Godot editor where rcodesign lives
          mkdir -p "$HOME/.config/godot"
          printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\nexport/macos/rcodesign = "/usr/local/bin/rcodesign"\n' \
            > "$HOME/.config/godot/editor_settings-4.7.tres"

      - name: Materialize signing credentials
        env:
          MACOS_SIGN_PEM_B64: ${{ secrets.MACOS_SIGN_PEM_B64 }}
          ASC_KEY_P8_B64: ${{ secrets.ASC_KEY_P8_B64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -e
          mkdir -p "$HOME/signing"
          echo "$MACOS_SIGN_PEM_B64" | base64 -d > "$HOME/signing/signing.pem"
          echo "$ASC_KEY_P8_B64" | base64 -d > "$HOME/signing/authkey.p8"
          rcodesign encode-app-store-connect-api-key -o "$HOME/signing/asc.json" \
            "$ASC_ISSUER_ID" "$ASC_KEY_ID" "$HOME/signing/authkey.p8"

      - name: Export macOS build, sign + notarize
        run: |
          set -e
          ./godot --headless --path . --export-release "macOS" build/isla-emmy-mac.zip
          cd build
          unzip -q isla-emmy-mac.zip -d macapp
          APP="$(find macapp -maxdepth 1 -name '*.app' | head -1)"
          echo "signing: $APP"
          rcodesign sign \
            --pem-file "$HOME/signing/signing.pem" \
            --code-signature-flags runtime \
            "$APP"
          echo "notarizing (waits for Apple)..."
          rcodesign notary-submit --api-key-file "$HOME/signing/asc.json" --staple "$APP"
          rm isla-emmy-mac.zip
          (cd macapp && zip -qry ../isla-emmy-mac.zip *.app)
          ls -la

      - name: Package macOS launcher
        run: |
          chmod +x "mac/Isla & Emmy.app/Contents/MacOS/launcher"
          (cd mac && zip -ry "../build/IslaEmmy-Mac.zip" "Isla & Emmy.app")
          ls -la build

      - name: Publish "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: |
            build/isla-emmy.x86_64
            build/isla-emmy-mac.zip
            build/IslaEmmy-Mac.zip
          make_latest: true
          body: "Auto-built binaries. Deck launcher pulls isla-emmy.x86_64; the Mac launcher app (IslaEmmy-Mac.zip, install once) pulls isla-emmy-mac.zip on every launch."
